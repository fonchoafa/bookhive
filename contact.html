<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - BookHive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .contact-form { max-width: 560px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1rem; }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--crimson); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Book<span>Hive</span> 📚</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="books.html">Books</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html">Login</a></li>
        <li class="nav-cart"><a href="cart.html">🛒 Cart</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container"><h1>Contact Us</h1></div>
  </div>

  <section>
    <div class="container">
      <div class="contact-form">
        <h2 style="margin-bottom:24px; text-align:center;">Get In Touch</h2>
        <form id="contactForm">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" placeholder="Full name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Write your message..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>© 2025 <strong>BookHive</strong> — An Indian Online Bookstore 🇮🇳</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
