<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - BookHive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>

  <header>
    <h1><a href="index.html">📚 BookHive</a></h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="books.html">Books</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" id="cart-link">🛒 Cart (<span id="cart-count">0</span>)</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <h2>Get in Touch</h2>
      <p>Have a question or feedback? We'd love to hear from you.</p>

      <form action="#" method="POST" class="contact-form">

        <!-- Name -->
        <div class="form-group">
          <label for="name">Your Name *</label>
          <input type="text" id="name" name="name" required>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>

        <!-- Subject Dropdown -->
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="general">General Inquiry</option>
            <option value="order">Order Issue</option>
            <option value="suggestion">Book Suggestion</option>
            <option value="partnership">Partnership</option>
          </select>
        </div>

        <!-- Message Textarea -->
        <div class="form-group">
          <label for="message">Your Message *</label>
          <textarea
            id="message"
            name="message"
            rows="6"
            placeholder="Tell us what's on your mind..."
            required
          ></textarea>
        </div>

        <button type="submit" class="btn-primary">Send Message</button>

      </form>
    </section>

    <!-- Contact Info -->
    <section class="contact-info">
      <h3>Other Ways to Reach Us</h3>
      <p>📧 Email: <a href="mailto:hello@bookhive.in">hello@bookhive.in</a></p>
      <p>📞 Phone: <a href="tel:+918012345678">+91 80-1234-5678</a></p>
      <p>📍 Address: 123 MG Road, Bengaluru, Karnataka 560001</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 BookHive. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
