<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - BookHive</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .auth-container { max-width: 420px; margin: 60px auto; background: var(--white); border-radius: 12px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    .auth-container h2 { text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: var(--crimson); }
    .auth-switch { text-align: center; margin-top: 16px; }
    .auth-switch a { color: var(--crimson); font-weight: 600; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Book<span>Hive</span> 📚</a>
    </div>
  </nav>

  <div class="container">
    <div class="auth-container">
      <h2>Create Account 📚</h2>
      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Create Account</button>
      </form>
      <div class="auth-switch">
        <p>Already have an account? <a href="login.html">Login</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
